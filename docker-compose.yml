version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - soc_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: soc_frontend
    ports:
      - "5173:5173"
      - "3000:5173"
    volumes:
      - ./frontend/src:/app/src:cached
    depends_on:
      - backend
    networks:
      - soc_net
    restart: unless-stopped

networks:
  soc_net:
    driver: bridge
