version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc_backend
    ports:
      - "8181:8181"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - soc_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - soc_net
    restart: unless-stopped

networks:
  soc_net:
    driver: bridge
